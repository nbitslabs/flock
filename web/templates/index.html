<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flock - Agent Orchestration</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
</head>
<body class="h-full bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 flex overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-gray-50 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col h-full flex-shrink-0" style="min-width:224px;max-width:480px">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800">
            <h1 class="text-xl font-bold text-gray-900 dark:text-white">Flock</h1>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Agent Orchestration</p>
        </div>

        <!-- Flock Agent -->
        <div class="p-3 border-b border-gray-200 dark:border-gray-800">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-300 uppercase tracking-wider">Flock</h2>
                <div class="flex items-center gap-2">
                    <button id="btn-flock-agent-rotate" class="text-xs text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 px-2 py-1 hidden" title="Rotate session">
                        ↻
                    </button>
                    <button id="btn-new-flock-agent" class="text-xs bg-purple-600 hover:bg-purple-700 text-white px-2 py-1 rounded">
                        + New
                    </button>
                </div>
            </div>
            <div id="flock-agent" class="hidden">
                <div class="flex items-center gap-2 px-2 py-1.5 rounded bg-purple-100 dark:bg-purple-900/30 cursor-pointer" data-action="select-flock-agent">
                    <span class="w-2 h-2 rounded-full bg-purple-500 flex-shrink-0"></span>
                    <span class="text-sm truncate text-purple-700 dark:text-purple-300">Flock Agent</span>
                </div>
            </div>
            <div id="flock-agent-empty" class="text-xs text-gray-400 dark:text-gray-500 px-2 py-1">
                No agent session
            </div>
        </div>

        <!-- Instances -->
        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <div class="p-3">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-300 uppercase tracking-wider">Instances</h2>
                    <button id="btn-new-instance" class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded">
                        + New
                    </button>
                </div>
                <div id="instance-list" class="space-y-1"></div>
            </div>

            <div class="p-3 border-t border-gray-200 dark:border-gray-800">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-300 uppercase tracking-wider">Sessions</h2>
                    <button id="btn-new-session" class="text-xs bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded hidden">
                        + New
                    </button>
                </div>
                <div id="session-list" class="space-y-1"></div>
            </div>
        </div>
    </aside>

    <!-- Resize Handle -->
    <div id="resize-handle" class="w-1 cursor-col-resize bg-gray-200 dark:bg-gray-800 hover:bg-blue-500 transition-colors flex-shrink-0"></div>

    <!-- Main Area -->
    <main class="flex-1 flex flex-col h-full min-w-0">
        <!-- Header -->
        <header class="px-4 py-3 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900 flex items-center justify-between">
            <div id="main-header" class="text-gray-500 dark:text-gray-400 text-sm truncate">Select an instance to get started</div>
            <div class="flex items-center gap-3">
                <div id="model-selector-container" class="hidden flex items-center gap-2">
                    <label class="text-xs text-gray-500 dark:text-gray-400">Model:</label>
                    <select id="model-selector" class="text-xs bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded px-2 py-1 text-gray-900 dark:text-gray-100">
                        <option value="">Default</option>
                    </select>
                </div>
                <button id="btn-theme-toggle" class="p-1.5 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors" title="Toggle theme">
                    <svg id="icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg id="icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
                <div id="header-status" class="flex items-center gap-2 text-xs text-gray-400 dark:text-gray-500 flex-shrink-0"></div>
            </div>
        </header>

        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto custom-scrollbar">
            <div id="messages-inner" class="max-w-4xl mx-auto p-4 space-y-4">
                <div id="settled-messages" class="space-y-4">
                    <div class="flex items-center justify-center text-gray-500 dark:text-gray-600 py-20">
                        <p>No messages yet. Create an instance and session to begin.</p>
                    </div>
                </div>
                <div id="streaming-area" class="hidden"></div>
            </div>
        </div>

        <!-- Input -->
        <div id="input-area" class="p-4 border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900 hidden">
            <div class="max-w-4xl mx-auto flex gap-2">
                <textarea id="message-input"
                    class="flex-1 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-4 py-2 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 custom-scrollbar"
                    placeholder="Type a message... (Enter to send, Shift+Enter for newline)"
                    rows="2"></textarea>
                <button id="btn-send"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg self-end transition-colors">
                    Send
                </button>
            </div>
        </div>
    </main>

    <!-- New Instance Modal -->
    <div id="modal-new-instance" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl p-6 w-96 shadow-2xl">
            <h3 class="text-lg font-bold mb-4 text-gray-900 dark:text-white">Add Repository</h3>
            <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">GitHub Repository URL</label>
            <input id="input-github-url" type="text"
                class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4"
                placeholder="https://github.com/org/repo">
            <p class="text-xs text-gray-500 dark:text-gray-400 mb-4">Enter a GitHub repository URL. The repository will be cloned if it doesn't exist locally.</p>
            <div class="flex justify-end gap-2">
                <button id="btn-cancel-instance" class="px-4 py-2 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">Cancel</button>
                <button id="btn-create-instance" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">Add</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
