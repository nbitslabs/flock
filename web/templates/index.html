<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flock - Agent Orchestration</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="h-full bg-gray-950 text-gray-100 flex">
    <!-- Sidebar -->
    <aside class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col h-full">
        <div class="p-4 border-b border-gray-800">
            <h1 class="text-xl font-bold text-white">Flock</h1>
            <p class="text-xs text-gray-400 mt-1">Agent Orchestration</p>
        </div>

        <!-- Instances -->
        <div class="flex-1 overflow-y-auto">
            <div class="p-3">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Instances</h2>
                    <button id="btn-new-instance" class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded">
                        + New
                    </button>
                </div>
                <div id="instance-list" class="space-y-1"></div>
            </div>

            <div class="p-3 border-t border-gray-800">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Sessions</h2>
                    <button id="btn-new-session" class="text-xs bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded hidden">
                        + New
                    </button>
                </div>
                <div id="session-list" class="space-y-1"></div>
            </div>
        </div>
    </aside>

    <!-- Main Area -->
    <main class="flex-1 flex flex-col h-full">
        <!-- Header -->
        <header class="p-4 border-b border-gray-800 bg-gray-900">
            <div id="main-header" class="text-gray-400 text-sm">Select an instance to get started</div>
        </header>

        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="flex items-center justify-center h-full text-gray-600">
                <p>No messages yet. Create an instance and session to begin.</p>
            </div>
        </div>

        <!-- Input -->
        <div id="input-area" class="p-4 border-t border-gray-800 bg-gray-900 hidden">
            <div class="flex gap-2">
                <textarea id="message-input"
                    class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 placeholder-gray-500 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Type a message... (Ctrl+Enter to send)"
                    rows="3"></textarea>
                <button id="btn-send"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg self-end">
                    Send
                </button>
            </div>
        </div>
    </main>

    <!-- New Instance Modal -->
    <div id="modal-new-instance" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
        <div class="bg-gray-900 border border-gray-700 rounded-xl p-6 w-96">
            <h3 class="text-lg font-bold mb-4">New OpenCode Instance</h3>
            <label class="block text-sm text-gray-400 mb-1">Working Directory</label>
            <input id="input-workdir" type="text"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4"
                placeholder="/path/to/project">
            <div class="flex justify-end gap-2">
                <button id="btn-cancel-instance" class="px-4 py-2 text-gray-400 hover:text-gray-200">Cancel</button>
                <button id="btn-create-instance" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">Create</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
